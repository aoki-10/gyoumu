<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <!-- PWA対応用メタタグ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="業務管理">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">
    
    <title>業務分担管理ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        /* モバイルでのスクロール改善 */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .active-ring { ring-offset-2 ring-2 ring-blue-500; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.firebaseApp = { auth, db, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [tasks, setTasks] = useState([]);
            const [config, setConfig] = useState({ roles: ['共通'], roleMajors: { '共通': [] }, accessKey: '' });
            const [loading, setLoading] = useState(true);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [authInput, setAuthInput] = useState('');
            
            // UI States
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [selectedRoleForSettings, setSelectedRoleForSettings] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [roleFilter, setRoleFilter] = useState('すべて');
            const [searchTerm, setSearchTerm] = useState('');

            // 追加用の入力管理
            const [newRoleInput, setNewRoleInput] = useState('');
            const [newMajorInput, setNewMajorInput] = useState('');

            const [formData, setFormData] = useState({
                major: '', medium: '', minor: '', owner: '', verifier: '', 
                doubleCheck: '－', handover: '×', role: '共通', 
                handoverFrom: '', handoverTo: '', memo: ''
            });

            const { auth, db, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.firebaseApp;

            const handoverLabels = { '◎': '完了', '〇': 'たまに確認OK', '△': '引き継ぎ中', '×': '未着手' };

            // Auth & Initial Config Load
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings');
                const unsubConfig = onSnapshot(configDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        // データの正規化
                        const normalizedConfig = {
                            roles: Array.isArray(data.roles) ? data.roles : ['共通'],
                            roleMajors: data.roleMajors || { '共通': [] },
                            accessKey: data.accessKey || ''
                        };
                        setConfig(normalizedConfig);
                        if (!normalizedConfig.accessKey) setIsAuthorized(true);
                    } else {
                        // 初期設定の書き込み
                        setDoc(configDoc, config);
                        setIsAuthorized(true);
                    }
                }, (error) => console.error("Config error:", error));

                const tasksCol = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
                const unsubTasks = onSnapshot(tasksCol, (snapshot) => {
                    setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (error) => console.error("Tasks error:", error));

                return () => { unsubConfig(); unsubTasks(); };
            }, [user]);

            // config.rolesが更新された際の初期選択
            useEffect(() => {
                if (config.roles.length > 0 && !selectedRoleForSettings) {
                    setSelectedRoleForSettings(config.roles[0]);
                }
            }, [config.roles]);

            // 設定保存用
            const handleSaveConfig = async (newConfig) => {
                if (!user) return;
                try {
                    const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings');
                    await setDoc(configDoc, newConfig);
                } catch (e) {
                    console.error("Save config error:", e);
                }
            };

            // 職種操作
            const addRole = (roleName) => {
                const trimmed = roleName?.trim();
                if (!trimmed) return;
                
                if (config.roles.includes(trimmed)) {
                    alert('既に存在する職種です');
                    return;
                }

                const newRoles = [...config.roles, trimmed];
                const newRoleMajors = { ...config.roleMajors, [trimmed]: [] };
                handleSaveConfig({ ...config, roles: newRoles, roleMajors: newRoleMajors });
                setNewRoleInput('');
            };

            const removeRole = (index) => {
                const roleToRemove = config.roles[index];
                if (!confirm(`職種「${roleToRemove}」を削除してもよろしいですか？（紐付いている大区分設定も消えます）`)) return;

                const newRoles = config.roles.filter((_, i) => i !== index);
                const newRoleMajors = { ...config.roleMajors };
                delete newRoleMajors[roleToRemove];
                
                handleSaveConfig({ ...config, roles: newRoles, roleMajors: newRoleMajors });
                if (selectedRoleForSettings === roleToRemove) {
                    setSelectedRoleForSettings(newRoles[0] || '');
                }
            };

            // 大区分操作
            const addMajorToRole = (majorName) => {
                const trimmed = majorName?.trim();
                if (!trimmed || !selectedRoleForSettings) return;
                
                const currentMajors = config.roleMajors[selectedRoleForSettings] || [];
                if (currentMajors.includes(trimmed)) {
                    alert('既に追加されている区分です');
                    return;
                }

                const newRoleMajors = { 
                    ...config.roleMajors, 
                    [selectedRoleForSettings]: [...currentMajors, trimmed] 
                };
                handleSaveConfig({ ...config, roleMajors: newRoleMajors });
                setNewMajorInput('');
            };

            const removeMajorFromRole = (majorIndex) => {
                if (!selectedRoleForSettings) return;
                const currentMajors = config.roleMajors[selectedRoleForSettings] || [];
                const newRoleMajors = { 
                    ...config.roleMajors, 
                    [selectedRoleForSettings]: currentMajors.filter((_, i) => i !== majorIndex) 
                };
                handleSaveConfig({ ...config, roleMajors: newRoleMajors });
            };

            // 認証チェック
            const handleAuth = () => {
                if (authInput === config.accessKey) {
                    setIsAuthorized(true);
                } else {
                    alert('アクセスキーが正しくありません');
                }
            };

            const sortedAndFilteredTasks = useMemo(() => {
                let filtered = tasks;
                if (roleFilter !== 'すべて') filtered = filtered.filter(t => t.role === roleFilter);
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    filtered = filtered.filter(t => 
                        (t.major || '').toLowerCase().includes(s) || 
                        (t.medium || '').toLowerCase().includes(s) || 
                        (t.owner || '').toLowerCase().includes(s)
                    );
                }
                return [...filtered].sort((a, b) => {
                    if (a.role !== b.role) return (a.role || '').localeCompare(b.role || '', 'ja');
                    return (a.major || '').localeCompare(b.major || '', 'ja');
                });
            }, [tasks, roleFilter, searchTerm]);

            const handleSaveTask = async () => {
                if (!user) return;
                try {
                    if (editingTask) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', editingTask.id), formData);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { ...formData, createdAt: Date.now() });
                    }
                    setIsModalOpen(false);
                } catch (e) { console.error(e); }
            };

            const confirmDelete = async () => {
                if (!deleteConfirm) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', deleteConfirm));
                    setDeleteConfirm(null);
                } catch (e) { console.error(e); }
            };

            const exportToExcel = () => {
                const title = `業務分担一覧_${new Date().toISOString().split('T')[0]}`;
                const styles = `<style>table { border-collapse: collapse; width: 100%; } th, td { border: 1px solid #ccc; padding: 8px; font-size: 12px; } th { background: #eee; }</style>`;
                let html = `<html><head><meta charset="utf-8">${styles}</head><body><h3>${title}</h3><table border="1"><thead><tr>`;
                ["職種", "大区分", "中区分", "小区分", "担当者", "確認者", "Wチェック", "引き継ぎ", "FROM", "TO", "メモ"].forEach(h => html += `<th>${h}</th>`);
                html += `</tr></thead><tbody>`;
                sortedAndFilteredTasks.forEach(t => {
                    html += `<tr><td>${t.role}</td><td>${t.major}</td><td>${t.medium}</td><td>${t.minor||''}</td><td>${t.owner||''}</td><td>${t.verifier||''}</td><td>${t.doubleCheck}</td><td>${t.handover}</td><td>${t.handoverFrom||''}</td><td>${t.handoverTo||''}</td><td>${t.memo||''}</td></tr>`;
                });
                html += `</tbody></table></body></html>`;
                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${title}.xls`;
                link.click();
            };

            // 認証画面
            if (!isAuthorized && !loading) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-in">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="lock" size="32"></i>
                            </div>
                            <h2 className="text-xl font-bold text-center mb-2">アクセス制限</h2>
                            <p className="text-slate-500 text-sm text-center mb-6">社内共有のアクセスキーを入力してください</p>
                            <input 
                                type="password" 
                                className="w-full px-4 py-3 bg-slate-100 rounded-xl mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-blue-500" 
                                placeholder="キーを入力" 
                                value={authInput}
                                onChange={(e) => setAuthInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAuth()}
                            />
                            <button onClick={handleAuth} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">認証する</button>
                        </div>
                    </div>
                );
            }

            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400">読み込み中...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-32">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center gap-2">
                                <span className="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="layout-grid" size="18"></i></span>
                                業務分担管理
                            </h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600 shadow-sm transition-all"><i data-lucide="settings" size="20"></i></button>
                            <button onClick={exportToExcel} className="p-2.5 bg-white border border-slate-200 rounded-xl text-emerald-600 shadow-sm transition-all"><i data-lucide="file-spreadsheet" size="20"></i></button>
                        </div>
                    </div>

                    {/* Filter & Search */}
                    <div className="space-y-3 mb-6">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            <button onClick={() => setRoleFilter('すべて')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === 'すべて' ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>すべて</button>
                            {config.roles.map(role => (
                                <button key={role} onClick={() => setRoleFilter(role)} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === role ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>{role}</button>
                            ))}
                        </div>
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="16"></i>
                            <input type="text" placeholder="キーワード検索..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    {/* Task Content - Desktop: Table, Mobile: Cards */}
                    <div className="hidden md:block bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50/80 border-b border-slate-200">
                                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <th className="px-6 py-4">職種 / 大区分</th>
                                    <th className="px-6 py-4">中区分</th>
                                    <th className="px-6 py-4">担当者</th>
                                    <th className="px-6 py-4 text-center">W</th>
                                    <th className="px-6 py-4 text-center">引継ぎ</th>
                                    <th className="px-6 py-4 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {sortedAndFilteredTasks.map(t => (
                                    <tr key={t.id} className="hover:bg-slate-50/50 group">
                                        <td className="px-6 py-4">
                                            <div className="text-[10px] font-black text-slate-400 mb-0.5">{t.role}</div>
                                            <div className="text-sm font-bold text-slate-900">{t.major}</div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="text-sm font-bold text-slate-800">{t.medium}</div>
                                            <div className="text-[10px] text-slate-400 mt-1">{t.minor || '-'}</div>
                                        </td>
                                        <td className="px-6 py-4 text-xs">
                                            <div className="font-bold">{t.owner || '未設定'}</div>
                                            <div className="text-slate-400">検: {t.verifier || '-'}</div>
                                        </td>
                                        <td className="px-6 py-4 text-center font-bold text-sm text-slate-400">{t.doubleCheck}</td>
                                        <td className="px-6 py-4 text-center">
                                            <div className={`text-xl ${t.handover === '◎' ? 'text-green-600 font-bold' : t.handover === '×' ? 'text-rose-400' : 'text-blue-500'}`}>{t.handover}</div>
                                        </td>
                                        <td className="px-6 py-4 text-right">
                                            <div className="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                                <button onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }} className="p-2 text-slate-400 hover:text-blue-600 transition-colors"><i data-lucide="edit-3" size="16"></i></button>
                                                <button onClick={() => setDeleteConfirm(t.id)} className="p-2 text-slate-400 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" size="16"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div className="md:hidden space-y-4">
                        {sortedAndFilteredTasks.map(t => (
                            <div key={t.id} className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm active:bg-slate-50 transition-colors" onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }}>
                                <div className="flex justify-between items-start mb-3">
                                    <span className="px-2 py-0.5 bg-slate-100 text-[10px] font-black text-slate-500 rounded-md uppercase">{t.role}</span>
                                    <div className={`text-2xl leading-none ${t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : 'text-blue-500'}`}>{t.handover}</div>
                                </div>
                                <h3 className="font-black text-slate-900 mb-1 leading-tight">{t.medium}</h3>
                                <p className="text-xs text-slate-500 mb-4">{t.major} / {t.minor || '-'}</p>
                                <div className="flex justify-between items-center pt-4 border-t border-slate-50">
                                    <div className="text-xs">
                                        <span className="text-slate-400 mr-2">担当:</span><span className="font-bold text-slate-700">{t.owner || '未設定'}</span>
                                    </div>
                                    <div className="text-[10px] font-bold text-slate-400">Wチェック: {t.doubleCheck}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Floating Add Button */}
                    <button onClick={() => { 
                        const firstRole = config.roles[0] || '共通';
                        setEditingTask(null); 
                        setFormData({ major: config.roleMajors[firstRole]?.[0] || '', medium: '', minor: '', owner: '', verifier: '', doubleCheck: '－', handover: '×', role: firstRole, handoverFrom: '', handoverTo: '', memo: '' }); 
                        setIsModalOpen(true); 
                    }} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-200 flex items-center justify-center active:scale-90 transition-all z-40 md:w-auto md:px-6 md:h-12 md:rounded-xl md:gap-2">
                        <i data-lucide="plus"></i>
                        <span className="hidden md:block font-bold">新規追加</span>
                    </button>

                    {/* Task Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="bg-white w-full max-w-2xl rounded-t-3xl md:rounded-3xl overflow-hidden animate-in shadow-2xl flex flex-col max-h-[92vh]">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                                    <h2 className="font-bold">{editingTask ? '編集' : '新規業務'}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full transition-colors"><i data-lucide="x" size="20"></i></button>
                                </div>
                                <div className="p-6 space-y-6 overflow-y-auto flex-1 pb-10">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">職種</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl font-bold outline-none" value={formData.role} onChange={e => {
                                                const r = e.target.value;
                                                setFormData({...formData, role: r, major: config.roleMajors[r]?.[0] || ''});
                                            }}>
                                                {config.roles.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">大区分</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl font-bold outline-none" value={formData.major} onChange={e => setFormData({...formData, major: e.target.value})}>
                                                {(config.roleMajors[formData.role] || []).map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">中区分 (業務名称)</label>
                                        <input className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl font-bold outline-none" value={formData.medium} onChange={e => setFormData({...formData, medium: e.target.value})} placeholder="例: 国保連請求" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">小区分 (詳細)</label>
                                        <textarea className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl h-20 outline-none resize-none" value={formData.minor} onChange={e => setFormData({...formData, minor: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">担当者</label>
                                            <input className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">確認者</label>
                                            <input className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none" value={formData.verifier} onChange={e => setFormData({...formData, verifier: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Wチェック</label>
                                            <div className="flex gap-2 bg-slate-100 p-1 rounded-2xl">
                                                {['〇', '×', '－'].map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, doubleCheck: v})} className={`flex-1 py-3 rounded-xl font-black transition-all ${formData.doubleCheck === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">引継ぎ状況</label>
                                            <div className="flex gap-1.5 bg-slate-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                                {Object.keys(handoverLabels).map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, handover: v})} className={`min-w-[50px] flex-1 py-3 rounded-xl font-black text-lg transition-all ${formData.handover === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{v}</button>
                                                ))}
                                            </div>
                                            <p className="text-[9px] text-center text-slate-400 font-bold tracking-tighter">{handoverLabels[formData.handover]}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="px-4 py-3 bg-slate-50 rounded-2xl text-xs outline-none" value={formData.handoverFrom} onChange={e => setFormData({...formData, handoverFrom: e.target.value})} placeholder="FROM: 誰から" />
                                        <input className="px-4 py-3 bg-slate-50 rounded-2xl text-xs outline-none" value={formData.handoverTo} onChange={e => setFormData({...formData, handoverTo: e.target.value})} placeholder="TO: 誰へ" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">メモ</label>
                                        <textarea className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl h-24 outline-none resize-none" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})} />
                                    </div>
                                    {editingTask && (
                                        <button onClick={() => setDeleteConfirm(editingTask.id)} className="w-full py-4 text-rose-500 font-bold text-sm bg-rose-50 rounded-2xl hover:bg-rose-100 transition-colors">データを削除する</button>
                                    )}
                                </div>
                                <div className="p-6 pt-2 border-t bg-white safe-area-bottom">
                                    <button onClick={handleSaveTask} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-4xl max-h-[85vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl animate-in">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                                    <h2 className="font-bold flex items-center gap-2"><i data-lucide="settings" size="18"></i> 設定とセキュリティ</h2>
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-10">
                                    <section>
                                        <h3 className="text-sm font-black text-slate-900 mb-4 flex items-center gap-2">
                                            <span className="w-6 h-6 rounded bg-slate-100 flex items-center justify-center text-[10px]">01</span> アクセスキー設定
                                        </h3>
                                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                            <p className="text-xs text-slate-500 mb-4">社外からのアクセスを制限するためのパスワードです</p>
                                            <div className="flex gap-2">
                                                <input type="text" className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 focus:ring-blue-500" value={config.accessKey || ''} onChange={(e) => handleSaveConfig({...config, accessKey: e.target.value})} placeholder="キーを設定（例: 1234）" />
                                            </div>
                                        </div>
                                    </section>
                                    <section className="flex flex-col md:flex-row gap-8">
                                        <div className="md:w-1/3">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">職種の管理</h3>
                                            <div className="space-y-2">
                                                {config.roles.map((r, i) => (
                                                    <button key={i} onClick={() => setSelectedRoleForSettings(r)} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-bold transition-all ${selectedRoleForSettings === r ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                        {r} <span onClick={(e) => { e.stopPropagation(); removeRole(i); }} className="p-1 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" size="14"></i></span>
                                                    </button>
                                                ))}
                                                <div className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" 
                                                        placeholder="新職種..." 
                                                        value={newRoleInput}
                                                        onChange={(e) => setNewRoleInput(e.target.value)}
                                                        onKeyDown={(e) => e.key === 'Enter' && addRole(newRoleInput)} 
                                                    />
                                                    <button onClick={() => addRole(newRoleInput)} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-all">追加</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="text-sm font-bold mb-4 flex items-center justify-between">
                                                <span>「{selectedRoleForSettings}」の大区分</span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">
                                                {(config.roleMajors[selectedRoleForSettings] || []).map((m, i) => (
                                                    <div key={i} className="flex justify-between px-4 py-3 bg-slate-50 rounded-xl border text-sm font-bold group hover:border-blue-200 transition-all">
                                                        {m} <button onClick={() => removeMajorFromRole(i)} className="text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="x" size="16"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="bg-slate-900 p-4 rounded-2xl flex gap-2">
                                                <input 
                                                    type="text" 
                                                    className="flex-1 px-4 py-3 bg-slate-800 border-none text-white rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" 
                                                    placeholder="新規区分を登録" 
                                                    value={newMajorInput}
                                                    onChange={(e) => setNewMajorInput(e.target.value)}
                                                    onKeyDown={(e) => e.key === 'Enter' && addMajorToRole(newMajorInput)} 
                                                />
                                                <button onClick={() => addMajorToRole(newMajorInput)} className="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition-all">登録</button>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center animate-in shadow-2xl">
                                <h3 className="font-bold mb-6">削除してもよろしいですか？</h3>
                                <div className="flex gap-3">
                                    <button onClick={confirmDelete} className="flex-1 py-4 bg-rose-600 text-white font-bold rounded-2xl active:scale-95 transition-all">削除する</button>
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-colors">やめる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="業務管理">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">
    
    <title>業務分担管理ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="loader">システムを起動中...</div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfj4ryE3dpw0MrECkGA0loENrUEdCBiaA",
            authDomain: "gyoumukanri-301ba.firebaseapp.com",
            projectId: "gyoumukanri-301ba",
            storageBucket: "gyoumukanri-301ba.firebasestorage.app",
            messagingSenderId: "1031524559575",
            appId: "1:1031524559575:web:c3f16c110591aa60889e92"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "gyoumukanri-main-v1"; 

            window.firebaseApp = { 
                auth, db, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch, signInAnonymously, onAuthStateChanged 
            };
            
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Firebase init error:", error);
            document.getElementById('loader').innerHTML = `<div class="p-6 text-center text-rose-600 font-bold">Firebase設定エラー</div>`;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // パスコード固定
        const MASTER_PASSCODE = "1870";

        const App = () => {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [tasks, setTasks] = useState([]);
            const [config, setConfig] = useState({ roles: ['共通'], roleMajors: { '共通': [] } });
            const [loading, setLoading] = useState(true);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [authInput, setAuthInput] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            
            // UI States
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [selectedRoleForSettings, setSelectedRoleForSettings] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [roleFilter, setRoleFilter] = useState('すべて');
            const [searchTerm, setSearchTerm] = useState('');

            // 追加・編集用入力管理
            const [newRoleInput, setNewRoleInput] = useState('');
            const [newMajorInput, setNewMajorInput] = useState('');
            const [editingRoleIndex, setEditingRoleIndex] = useState(null);
            const [editingRoleValue, setEditingRoleValue] = useState('');
            const [editingMajorIndex, setEditingMajorIndex] = useState(null);
            const [editingMajorValue, setEditingMajorValue] = useState('');

            const [formData, setFormData] = useState({
                major: '', medium: '', minor: '', owner: '', verifier: '', 
                doubleCheck: '－', handover: '×', role: '共通', 
                handoverFrom: '', handoverTo: '', memo: ''
            });

            const handoverLabels = { '◎': '完了', '〇': 'たまに確認OK', '△': '引き継ぎ中', '×': '未着手' };

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseApp) {
                        setReady(true);
                        document.getElementById('loader').style.display = 'none';
                    }
                };
                checkFirebase();
                window.addEventListener('firebase-ready', checkFirebase);
                return () => window.removeEventListener('firebase-ready', checkFirebase);
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseApp;
                signInAnonymously(auth).catch(err => {
                    if (err.code === 'auth/configuration-not-found') setErrorMessage("匿名認証を有効にしてください。");
                });
                return onAuthStateChanged(auth, setUser);
            }, [ready]);

            useEffect(() => {
                if (!ready || !user) return;
                const { db, appId, collection, doc, setDoc, onSnapshot } = window.firebaseApp;
                
                const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const normalized = {
                            roles: Array.isArray(data.roles) ? data.roles : ['共通'],
                            roleMajors: data.roleMajors || { '共通': [] }
                        };
                        setConfig(normalized);
                        if (!selectedRoleForSettings && normalized.roles.length > 0) setSelectedRoleForSettings(normalized.roles[0]);
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), config);
                    }
                });

                const unsubTasks = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snapshot) => {
                    setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });

                return () => { unsubConfig(); unsubTasks(); };
            }, [ready, user]);

            const handleSaveConfig = async (newConfig) => {
                if (!ready || !user) return;
                const { db, appId, doc, setDoc } = window.firebaseApp;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), newConfig);
            };

            // --- 職種操作 ---
            const addRole = () => {
                const name = newRoleInput?.trim();
                if (!name || config.roles.includes(name)) return;
                const nextConfig = { 
                    ...config, 
                    roles: [...config.roles, name], 
                    roleMajors: { ...config.roleMajors, [name]: [] } 
                };
                handleSaveConfig(nextConfig);
                setNewRoleInput('');
            };

            const startEditRole = (idx) => {
                setEditingRoleIndex(idx);
                setEditingRoleValue(config.roles[idx]);
            };

            const saveEditedRole = async () => {
                const oldName = config.roles[editingRoleIndex];
                const newName = editingRoleValue?.trim();
                if (!newName || oldName === newName) {
                    setEditingRoleIndex(null);
                    return;
                }

                const { db, appId, collection, writeBatch, doc } = window.firebaseApp;
                const batch = writeBatch(db);
                tasks.filter(t => t.role === oldName).forEach(t => {
                    batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), { role: newName });
                });

                const newRoles = [...config.roles];
                newRoles[editingRoleIndex] = newName;
                const newMajors = { ...config.roleMajors };
                newMajors[newName] = newMajors[oldName] || [];
                delete newMajors[oldName];

                await batch.commit();
                handleSaveConfig({ ...config, roles: newRoles, roleMajors: newMajors });
                setEditingRoleIndex(null);
                if (selectedRoleForSettings === oldName) setSelectedRoleForSettings(newName);
            };

            const removeRole = (index) => {
                const role = config.roles[index];
                if (!confirm(`職種「${role}」を削除しますか？`)) return;
                const newRoles = config.roles.filter((_, i) => i !== index);
                const newMajors = { ...config.roleMajors }; delete newMajors[role];
                handleSaveConfig({ ...config, roles: newRoles, roleMajors: newMajors });
                if (selectedRoleForSettings === role) setSelectedRoleForSettings(newRoles[0] || '');
            };

            // --- 大区分操作 ---
            const addMajorToRole = () => {
                const name = newMajorInput?.trim();
                if (!name || !selectedRoleForSettings) return;
                const currentMajors = config.roleMajors[selectedRoleForSettings] || [];
                if (currentMajors.includes(name)) return;
                const nextConfig = { 
                    ...config, 
                    roleMajors: { 
                        ...config.roleMajors, 
                        [selectedRoleForSettings]: [...currentMajors, name] 
                    } 
                };
                handleSaveConfig(nextConfig);
                setNewMajorInput('');
            };

            const startEditMajor = (idx) => {
                setEditingMajorIndex(idx);
                setEditingMajorValue(config.roleMajors[selectedRoleForSettings][idx]);
            };

            const saveEditedMajor = async () => {
                const oldMajor = config.roleMajors[selectedRoleForSettings][editingMajorIndex];
                const newMajor = editingMajorValue?.trim();
                if (!newMajor || oldMajor === newMajor) {
                    setEditingMajorIndex(null);
                    return;
                }

                const { db, appId, writeBatch, doc } = window.firebaseApp;
                const batch = writeBatch(db);
                tasks.filter(t => t.role === selectedRoleForSettings && t.major === oldMajor).forEach(t => {
                    batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), { major: newMajor });
                });

                const updatedMajors = [...config.roleMajors[selectedRoleForSettings]];
                updatedMajors[editingMajorIndex] = newMajor;
                
                await batch.commit();
                handleSaveConfig({ 
                    ...config, 
                    roleMajors: { ...config.roleMajors, [selectedRoleForSettings]: updatedMajors } 
                });
                setEditingMajorIndex(null);
            };

            const removeMajorFromRole = (idx) => {
                const majors = config.roleMajors[selectedRoleForSettings] || [];
                const nextConfig = { 
                    ...config, 
                    roleMajors: { 
                        ...config.roleMajors, 
                        [selectedRoleForSettings]: majors.filter((_, i) => i !== idx) 
                    } 
                };
                handleSaveConfig(nextConfig);
            };

            const handleAuth = () => {
                if (authInput === MASTER_PASSCODE) setIsAuthorized(true);
                else alert('パスコードが正しくありません');
            };

            const filteredTasks = useMemo(() => {
                let f = tasks;
                if (roleFilter !== 'すべて') f = f.filter(t => t.role === roleFilter);
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    f = f.filter(t => (t.major + (t.medium||'') + (t.owner||'')).toLowerCase().includes(s));
                }
                return f.sort((a,b) => (a.role+a.major).localeCompare(b.role+b.major, 'ja'));
            }, [tasks, roleFilter, searchTerm]);

            const handleSaveTask = async () => {
                if (!ready || !user) return;
                const { db, appId, collection, doc, addDoc, updateDoc } = window.firebaseApp;
                if (editingTask) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', editingTask.id), formData);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { ...formData, createdAt: Date.now() });
                setIsModalOpen(false);
            };

            const confirmDelete = async () => {
                if (!ready || !deleteConfirm) return;
                const { db, appId, doc, deleteDoc } = window.firebaseApp;
                
                // データの削除を実行
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', deleteConfirm));
                
                // 全ての確認・編集画面を閉じる
                setDeleteConfirm(null);
                setIsModalOpen(false);
                setEditingTask(null);
            };

            const exportToExcel = () => {
                const title = `業務一覧_${new Date().toISOString().split('T')[0]}`;
                let html = `<html><head><meta charset="utf-8"><style>table{border-collapse:collapse;} th,td{border:1px solid #ccc;padding:8px;font-size:12px;} th{background:#eee;}</style></head><body><h3>${title}</h3><table border="1"><thead><tr><th>職種</th><th>大区分</th><th>中区分</th><th>小区分</th><th>担当</th><th>確認</th><th>W</th><th>引継</th><th>FROM</th><th>TO</th><th>メモ</th></tr></thead><tbody>`;
                filteredTasks.forEach(t => {
                    html += `<tr><td>${t.role}</td><td>${t.major}</td><td>${t.medium}</td><td>${t.minor||''}</td><td>${t.owner||''}</td><td>${t.verifier||''}</td><td>${t.doubleCheck}</td><td>${t.handover}</td><td>${t.handoverFrom||''}</td><td>${t.handoverTo||''}</td><td>${t.memo||''}</td></tr>`;
                });
                html += `</tbody></table></body></html>`;
                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${title}.xls`;
                link.click();
            };

            if (!ready) return null;

            if (errorMessage) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-900 text-white">
                        <div className="max-w-md bg-slate-800 p-8 rounded-3xl border border-rose-500/30 text-center">
                            <h2 className="text-xl font-bold mb-4">設定エラー</h2>
                            <p className="text-slate-300 text-sm mb-8">{errorMessage}</p>
                            <button onClick={() => window.location.reload()} className="w-full py-3 bg-blue-600 rounded-xl font-bold">再試行</button>
                        </div>
                    </div>
                );
            }

            if (!isAuthorized && !loading) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-900 text-slate-900">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="lock" size="32"></i>
                            </div>
                            <h2 className="text-xl font-bold text-center mb-2">業務管理システム</h2>
                            <p className="text-slate-500 text-sm text-center mb-6">パスコードを入力してください</p>
                            <input 
                                type="password" 
                                className="w-full px-4 py-3 bg-slate-100 rounded-xl mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
                                placeholder="パスコードを入力" 
                                value={authInput}
                                onChange={(e) => setAuthInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAuth()}
                            />
                            <button onClick={handleAuth} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">認証する</button>
                        </div>
                    </div>
                );
            }

            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold italic">Loading data...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-32">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center gap-2">
                            <span className="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="layout-grid" size="18"></i></span>
                            業務分担管理
                        </h1>
                        <div className="flex gap-2 text-slate-600">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all shadow-sm"><i data-lucide="settings" size="20"></i></button>
                            <button onClick={exportToExcel} className="p-2.5 bg-white border border-slate-200 rounded-xl text-emerald-600 transition-all shadow-sm"><i data-lucide="file-spreadsheet" size="20"></i></button>
                        </div>
                    </div>

                    {/* Filter Bar */}
                    <div className="space-y-3 mb-6">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 text-slate-900">
                            <button onClick={() => setRoleFilter('すべて')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === 'すべて' ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>すべて</button>
                            {config.roles.map(role => (
                                <button key={role} onClick={() => setRoleFilter(role)} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === role ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>{role}</button>
                            ))}
                        </div>
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="16"></i>
                            <input type="text" placeholder="キーワード検索..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    {/* Task Table */}
                    <div className="hidden md:block bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50/80 border-b border-slate-200">
                                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <th className="px-6 py-4">職種 / 大区分</th>
                                    <th className="px-6 py-4">中区分</th>
                                    <th className="px-6 py-4">担当者</th>
                                    <th className="px-6 py-4 text-center">W</th>
                                    <th className="px-6 py-4 text-center">引継ぎ</th>
                                    <th className="px-6 py-4 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredTasks.map(t => (
                                    <tr key={t.id} className="hover:bg-slate-50/50 group transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="text-[10px] font-black text-slate-400 mb-0.5 uppercase tracking-tighter">{t.role}</div>
                                            <div className="text-sm font-bold text-slate-900">{t.major}</div>
                                        </td>
                                        <td className="px-6 py-4 font-bold text-slate-800">{t.medium}</td>
                                        <td className="px-6 py-4 text-xs font-medium">
                                            <div>{t.owner || '-'}</div>
                                            <div className="text-slate-400">検: {t.verifier || '-'}</div>
                                        </td>
                                        <td className="px-6 py-4 text-center font-bold text-slate-400">{t.doubleCheck}</td>
                                        <td className="px-6 py-4 text-center text-xl font-bold">
                                            <span className={t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : 'text-blue-500'}>{t.handover}</span>
                                        </td>
                                        <td className="px-6 py-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }} className="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="pencil" size="16"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Mobile Card View */}
                    <div className="md:hidden space-y-4">
                        {filteredTasks.map(t => (
                            <div key={t.id} className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm active:bg-slate-50 transition-colors" onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }}>
                                <div className="flex justify-between items-start mb-3">
                                    <span className="px-2 py-0.5 bg-slate-100 text-[10px] font-black text-slate-500 rounded-md">{t.role}</span>
                                    <span className={`text-2xl leading-none ${t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : 'text-blue-500'}`}>{t.handover}</span>
                                </div>
                                <h3 className="font-bold text-slate-900 mb-1 leading-snug">{t.medium}</h3>
                                <p className="text-xs text-slate-400">{t.major}</p>
                            </div>
                        ))}
                    </div>

                    {/* Floating Add Button */}
                    <button onClick={() => { 
                        const firstRole = config.roles[0] || '共通';
                        setEditingTask(null); 
                        setFormData({ major: config.roleMajors[firstRole]?.[0] || '', medium: '', minor: '', owner: '', verifier: '', doubleCheck: '－', handover: '×', role: firstRole, handoverFrom: '', handoverTo: '', memo: '' }); 
                        setIsModalOpen(true); 
                    }} className="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl flex items-center justify-center z-40 transition-transform active:scale-90">
                        <i data-lucide="plus"></i>
                    </button>

                    {/* Task Entry Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4 text-slate-900">
                            <div className="bg-white w-full max-w-2xl rounded-t-3xl md:rounded-3xl flex flex-col max-h-[92vh] overflow-hidden animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="font-bold">{editingTask ? '業務内容の編集' : '新規業務の登録'}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" size="20"></i></button>
                                </div>
                                <div className="p-6 space-y-6 overflow-y-auto flex-1">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">職種</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={formData.role} onChange={e => setFormData({...formData, role: e.target.value, major: config.roleMajors[e.target.value]?.[0] || ''})}>
                                                {config.roles.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">大区分</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={formData.major} onChange={e => setFormData({...formData, major: e.target.value})}>
                                                {(config.roleMajors[formData.role] || []).map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">中区分 (業務名称)</label>
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500" value={formData.medium} onChange={e => setFormData({...formData, medium: e.target.value})} placeholder="業務名を入力" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">小区分 (詳細)</label>
                                        <textarea className="w-full px-4 py-3 bg-slate-50 rounded-2xl h-20 outline-none resize-none focus:ring-2 focus:ring-blue-500" value={formData.minor} onChange={e => setFormData({...formData, minor: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-sm">
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl outline-none" placeholder="担当者氏名" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl outline-none" placeholder="確認責任者" value={formData.verifier} onChange={e => setFormData({...formData, verifier: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 pt-4 border-t">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Wチェック</label>
                                            <div className="flex gap-2 bg-slate-100 p-1 rounded-2xl">
                                                {['〇', '×', '－'].map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, doubleCheck: v})} className={`flex-1 py-3 rounded-xl font-black transition-all ${formData.doubleCheck === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">引継ぎ状況</label>
                                            <div className="flex gap-1.5 bg-slate-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                                {Object.keys(handoverLabels).map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, handover: v})} className={`min-w-[50px] flex-1 py-3 rounded-xl font-black text-lg transition-all ${formData.handover === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="px-4 py-3 bg-slate-50 rounded-2xl text-xs outline-none" value={formData.handoverFrom} onChange={e => setFormData({...formData, handoverFrom: e.target.value})} placeholder="FROM: 誰から" />
                                        <input className="px-4 py-3 bg-slate-50 rounded-2xl text-xs outline-none" value={formData.handoverTo} onChange={e => setFormData({...formData, handoverTo: e.target.value})} placeholder="TO: 誰へ" />
                                    </div>
                                    <textarea className="w-full px-4 py-3 bg-slate-50 rounded-2xl h-24 outline-none resize-none focus:ring-2 focus:ring-blue-500" placeholder="備考・メモ" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})} />
                                    {editingTask && <button onClick={() => setDeleteConfirm(editingTask.id)} className="w-full py-4 text-rose-500 font-bold bg-rose-50 rounded-2xl transition-colors hover:bg-rose-100">このデータを削除する</button>}
                                </div>
                                <div className="p-6 border-t bg-white safe-area-bottom">
                                    <button onClick={handleSaveTask} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 text-slate-900">
                            <div className="bg-white w-full max-w-4xl max-h-[85vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="font-bold flex items-center gap-2"><i data-lucide="settings" size="18"></i> システム詳細設定</h2>
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2"><i data-lucide="x"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-10">
                                    <div className="p-4 bg-blue-50 border border-blue-100 rounded-2xl text-blue-800 text-[10px] md:text-xs">
                                        ※パスコードは「1870」に固定されています。職種名や区分名を編集すると、既存データも自動更新されます。
                                    </div>
                                    <section className="flex flex-col md:flex-row gap-8">
                                        {/* Roles Section */}
                                        <div className="md:w-1/3 space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">職種の管理</h3>
                                            <div className="space-y-2">
                                                {config.roles.map((r, i) => (
                                                    <div key={i} className={`flex items-center gap-2 p-1 rounded-xl transition-all ${selectedRoleForSettings === r ? 'bg-blue-50 ring-1 ring-blue-200' : 'bg-slate-50'}`}>
                                                        {editingRoleIndex === i ? (
                                                            <div className="flex-1 flex gap-1 animate-fade-in">
                                                                <input autoFocus className="flex-1 px-3 py-2 text-sm bg-white rounded-lg outline-none ring-2 ring-blue-500" value={editingRoleValue} onChange={e => setEditingRoleValue(e.target.value)} />
                                                                <button onClick={saveEditedRole} className="p-2 text-green-600 hover:bg-green-50 rounded-lg"><i data-lucide="check" size="16"></i></button>
                                                                <button onClick={() => setEditingRoleIndex(null)} className="p-2 text-slate-400 hover:bg-slate-100 rounded-lg"><i data-lucide="x" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <button onClick={() => setSelectedRoleForSettings(r)} className={`flex-1 text-left px-4 py-2.5 rounded-lg text-sm font-bold transition-all ${selectedRoleForSettings === r ? 'text-blue-600' : 'text-slate-500 hover:bg-white/50'}`}>{r}</button>
                                                                <button onClick={() => startEditRole(i)} className="p-2 text-slate-400 hover:text-blue-500"><i data-lucide="pencil" size="14"></i></button>
                                                                <button onClick={() => removeRole(i)} className="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" size="14"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-1">
                                                <input className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm outline-none shadow-sm focus:ring-2 focus:ring-blue-500 transition-all" placeholder="新職種..." value={newRoleInput} onChange={e => setNewRoleInput(e.target.value)} />
                                                <button onClick={addRole} className="p-3 bg-blue-600 text-white rounded-xl shadow-lg active:scale-95 transition-all"><i data-lucide="plus" size="18"></i></button>
                                            </div>
                                        </div>

                                        {/* Majors Section */}
                                        <div className="flex-1 space-y-4">
                                            <h3 className="text-sm font-bold mb-2">「{selectedRoleForSettings}」の大区分</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">
                                                {(config.roleMajors[selectedRoleForSettings] || []).map((m, i) => (
                                                    <div key={i} className="flex items-center gap-2 px-3 py-1 bg-slate-50 rounded-xl border border-slate-100">
                                                        {editingMajorIndex === i ? (
                                                            <div className="flex-1 flex gap-1 py-1 animate-fade-in">
                                                                <input autoFocus className="flex-1 px-3 py-1.5 text-sm bg-white rounded-lg outline-none ring-2 ring-blue-500" value={editingMajorValue} onChange={e => setEditingMajorValue(e.target.value)} />
                                                                <button onClick={saveEditedMajor} className="p-1.5 text-green-600 hover:bg-green-50 rounded-lg"><i data-lucide="check" size="16"></i></button>
                                                                <button onClick={() => setEditingMajorIndex(null)} className="p-1.5 text-slate-400 hover:bg-slate-100 rounded-lg"><i data-lucide="x" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <span className="flex-1 text-sm font-bold text-slate-700 py-2">{m}</span>
                                                                <button onClick={() => startEditMajor(i)} className="p-2 text-slate-400 hover:text-blue-500"><i data-lucide="pencil" size="14"></i></button>
                                                                <button onClick={() => removeMajorFromRole(i)} className="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="x" size="16"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <input className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm outline-none shadow-sm focus:ring-2 focus:ring-blue-500 transition-all" placeholder="新規区分を登録..." value={newMajorInput} onChange={e => setNewMajorInput(e.target.value)} />
                                                <button onClick={addMajorToRole} className="px-6 bg-slate-800 text-white rounded-xl shadow-lg active:scale-95 transition-all"><i data-lucide="plus" size="18"></i></button>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirm Overlay */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in text-slate-900">
                                <h3 className="font-bold mb-6">データを削除しますか？</h3>
                                <div className="flex gap-3">
                                    <button onClick={confirmDelete} className="flex-1 py-4 bg-rose-600 text-white font-bold rounded-2xl active:scale-95 transition-all">削除</button>
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-all">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        const updateIcons = () => lucide.createIcons();
        setInterval(updateIcons, 1000);
    </script>
</body>
</html>

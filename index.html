<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="業務管理">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">
    
    <title>業務分担管理ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dragging { opacity: 0.4; background: #eff6ff !important; border: 2px dashed #3b82f6 !important; }
        .drag-over { border-top: 3px solid #3b82f6 !important; }
        .sortable-item { cursor: grab; transition: transform 0.1s; }
        .sortable-item:active { cursor: grabbing; }
        .touch-dragging { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 50; }
        
        .tag-dx { background-color: #dbeafe; color: #1e40af; }
        .tag-office { background-color: #fef3c7; color: #92400e; }
        .tag-common { background-color: #f3f4f6; color: #374151; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="loader">システムを起動中...</div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfj4ryE3dpw0MrECkGA0loENrUEdCBiaA",
            authDomain: "gyoumukanri-301ba.firebaseapp.com",
            projectId: "gyoumukanri-301ba",
            storageBucket: "gyoumukanri-301ba.firebasestorage.app",
            messagingSenderId: "1031524559575",
            appId: "1:1031524559575:web:c3f16c110591aa60889e92"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "gyoumukanri-v2-hierarchical"; 

            window.firebaseApp = { 
                auth, db, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch,
                signInAnonymously, onAuthStateChanged
            };
            
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Firebase init error:", error);
            document.getElementById('loader').innerHTML = `<div class="p-6 text-center text-rose-600 font-bold">Firebase設定エラー</div>`;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const MASTER_PASSCODE = "1870";

        const App = () => {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [tasks, setTasks] = useState([]);
            
            const [config, setConfig] = useState({ 
                depts: ['本部'], 
                categories: { '本部': ['事務', 'DX', '経営企画'] },
                items: { '事務': ['備品管理', '経費精算'], 'DX': ['システム導入', 'RPA作成'] }
            });
            
            const [loading, setLoading] = useState(true);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState('');
            const [errorMessage, setErrorMessage] = useState(null);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [selectedDeptForSettings, setSelectedDeptForSettings] = useState('');
            const [selectedCatForSettings, setSelectedCatForSettings] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            
            const [deptFilter, setDeptFilter] = useState('すべて');
            const [catFilter, setCatFilter] = useState('すべて');
            const [ownerFilter, setOwnerFilter] = useState('全員');
            const [searchTerm, setSearchTerm] = useState('');

            const [draggedIndex, setDraggedIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [dragType, setDragType] = useState(null); 
            const longPressTimer = useRef(null);

            const [newDeptInput, setNewDeptInput] = useState('');
            const [newCatInput, setNewCatInput] = useState('');
            const [newItemInput, setNewItemInput] = useState('');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editingValue, setEditingValue] = useState('');

            const [formData, setFormData] = useState({
                dept: '', category: '', item: '', minor: '', owner: '', verifier: '', 
                doubleCheck: '－', handover: '×', successor: '', memo: ''
            });

            const handoverLabels = { '◎': '完了', '〇': 'たまに確認OK', '△': '引継中', '×': '未着手', '－': 'なし' };

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseApp) {
                        setReady(true);
                        const loader = document.getElementById('loader');
                        if (loader) loader.style.display = 'none';
                    }
                };
                checkFirebase();
                window.addEventListener('firebase-ready', checkFirebase);
                return () => window.removeEventListener('firebase-ready', checkFirebase);
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseApp;
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, [ready]);

            useEffect(() => {
                if (!ready || !user || !isAuthorized) return;
                const { db, appId, collection, doc, setDoc, onSnapshot } = window.firebaseApp;
                
                const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const d = data.depts || ['本部'];
                        setConfig({
                            depts: d,
                            categories: data.categories || {},
                            items: data.items || {}
                        });
                        setSelectedDeptForSettings(prev => (!prev || !d.includes(prev)) ? (d[0] || '') : prev);
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), config);
                    }
                }, (error) => console.error("Config listener error:", error));

                const unsubTasks = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snapshot) => {
                    setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (error) => console.error("Tasks listener error:", error));

                return () => { unsubConfig(); unsubTasks(); };
            }, [ready, user, isAuthorized]);

            const handlePasscodeAuth = (e) => {
                if (e) e.preventDefault();
                if (passcodeInput === MASTER_PASSCODE) {
                    setIsAuthorized(true);
                    setErrorMessage(null);
                } else {
                    setErrorMessage("パスコードが正しくありません。");
                }
            };

            const handleSaveConfig = async (newConfig) => {
                if (!ready || !user) return;
                const { db, appId, doc, setDoc } = window.firebaseApp;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), newConfig);
            };

            const handleSortEnd = () => {
                if (draggedIndex === null || dragOverIndex === null || draggedIndex === dragOverIndex) {
                    setDraggedIndex(null); setDragOverIndex(null); setDragType(null); return;
                }
                const newConfig = { ...config };
                if (dragType === 'dept') {
                    const list = [...newConfig.depts];
                    const [item] = list.splice(draggedIndex, 1);
                    list.splice(dragOverIndex, 0, item);
                    newConfig.depts = list;
                } else if (dragType === 'cat') {
                    const list = [...(newConfig.categories[selectedDeptForSettings] || [])];
                    const [item] = list.splice(draggedIndex, 1);
                    list.splice(dragOverIndex, 0, item);
                    newConfig.categories[selectedDeptForSettings] = list;
                } else if (dragType === 'item') {
                    const list = [...(newConfig.items[selectedCatForSettings] || [])];
                    const [item] = list.splice(draggedIndex, 1);
                    list.splice(dragOverIndex, 0, item);
                    newConfig.items[selectedCatForSettings] = list;
                }
                handleSaveConfig(newConfig);
                setDraggedIndex(null); setDragOverIndex(null); setDragType(null);
            };

            const startTouchSort = (index, type) => {
                longPressTimer.current = setTimeout(() => {
                    setDraggedIndex(index); setDragType(type);
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 500);
            };

            const moveTouchSort = (e) => {
                if (draggedIndex === null) { clearTimeout(longPressTimer.current); return; }
                e.preventDefault();
                const touch = e.touches[0];
                const element = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('[data-index]');
                if (element && element.getAttribute('data-type') === dragType) {
                    setDragOverIndex(parseInt(element.getAttribute('data-index')));
                }
            };

            const ownerList = useMemo(() => {
                const set = new Set();
                tasks.forEach(t => { if(t.owner) set.add(t.owner); });
                return Array.from(set).sort();
            }, [tasks]);

            const categoryListForFilter = useMemo(() => {
                if (deptFilter === 'すべて') {
                    const set = new Set();
                    Object.values(config.categories).forEach(list => list.forEach(c => set.add(c)));
                    return Array.from(set);
                }
                return config.categories[deptFilter] || [];
            }, [deptFilter, config]);

            const filteredTasks = useMemo(() => {
                let f = tasks || [];
                if (deptFilter !== 'すべて') f = f.filter(t => t.dept === deptFilter);
                if (catFilter !== 'すべて') f = f.filter(t => t.category === catFilter);
                if (ownerFilter !== '全員') f = f.filter(t => t.owner === ownerFilter);
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    f = f.filter(t => ((t.dept||'') + (t.category||'') + (t.item||'') + (t.owner||'') + (t.memo||'') + (t.successor||'')).toLowerCase().includes(s));
                }
                return [...f].sort((a,b) => {
                    const dIdxA = config.depts.indexOf(a.dept);
                    const dIdxB = config.depts.indexOf(b.dept);
                    if (dIdxA !== dIdxB) return dIdxA - dIdxB;
                    const cList = config.categories[a.dept] || [];
                    const cIdxA = cList.indexOf(a.category);
                    const cIdxB = cList.indexOf(b.category);
                    if (cIdxA !== cIdxB) return cIdxA - cIdxB;
                    return (a.item || '').localeCompare(b.item || '', 'ja');
                });
            }, [tasks, deptFilter, catFilter, ownerFilter, searchTerm, config]);

            const handleSaveTask = async () => {
                const { db, appId, collection, doc, addDoc, updateDoc } = window.firebaseApp;
                const data = { ...formData, updatedAt: Date.now() };
                if (editingTask) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', editingTask.id), data);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { ...data, createdAt: Date.now() });
                setIsModalOpen(false);
            };

            const confirmDelete = async () => {
                if (!ready || !deleteConfirm) return;
                const { db, appId, doc, deleteDoc } = window.firebaseApp;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', deleteConfirm));
                    setDeleteConfirm(null);
                    setIsModalOpen(false);
                    setEditingTask(null);
                } catch (error) { console.error("Delete task failed:", error); }
            };

            const addDept = () => {
                const n = newDeptInput?.trim();
                if(!n || config.depts.includes(n)) return;
                handleSaveConfig({ ...config, depts: [...config.depts, n] });
                setNewDeptInput(''); setSelectedDeptForSettings(n);
            };
            const addCat = () => {
                const n = newCatInput?.trim();
                if(!n || !selectedDeptForSettings) return;
                const list = config.categories[selectedDeptForSettings] || [];
                if(list.includes(n)) return;
                handleSaveConfig({ ...config, categories: { ...config.categories, [selectedDeptForSettings]: [...list, n] } });
                setNewCatInput(''); setSelectedCatForSettings(n);
            };
            const addItem = () => {
                const n = newItemInput?.trim();
                if(!n || !selectedCatForSettings) return;
                const list = config.items[selectedCatForSettings] || [];
                if(list.includes(n)) return;
                handleSaveConfig({ ...config, items: { ...config.items, [selectedCatForSettings]: [...list, n] } });
                setNewItemInput('');
            };

            const startEdit = (idx, val, type) => { setEditingIndex(idx); setEditingValue(val); setDragType(type); };

            const saveEdit = async () => {
                const n = editingValue?.trim();
                if(!n || editingIndex === null) { setEditingIndex(null); return; }
                const { db, appId, writeBatch, doc } = window.firebaseApp;
                const batch = writeBatch(db);
                
                const newConfig = { ...config };
                if (dragType === 'dept') {
                    const old = config.depts[editingIndex];
                    tasks.filter(t => t.dept === old).forEach(t => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), { dept: n }));
                    newConfig.depts[editingIndex] = n;
                    newConfig.categories[n] = newConfig.categories[old] || []; delete newConfig.categories[old];
                } else if (dragType === 'cat') {
                    const old = config.categories[selectedDeptForSettings][editingIndex];
                    tasks.filter(t => t.dept === selectedDeptForSettings && t.category === old).forEach(t => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), { category: n }));
                    newConfig.categories[selectedDeptForSettings][editingIndex] = n;
                    newConfig.items[n] = newConfig.items[old] || []; delete newConfig.items[old];
                } else if (dragType === 'item') {
                    const old = config.items[selectedCatForSettings][editingIndex];
                    tasks.filter(t => t.category === selectedCatForSettings && t.item === old).forEach(t => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), { item: n }));
                    newConfig.items[selectedCatForSettings][editingIndex] = n;
                }
                
                await batch.commit();
                handleSaveConfig(newConfig);
                setEditingIndex(null);
            };

            // 部署・カテゴリの物理削除ロジック（即時削除に修正）
            const handleDeleteDept = (idx) => {
                const deptName = config.depts[idx];
                const newConfig = { ...config };
                newConfig.depts = config.depts.filter((_, i) => i !== idx);
                
                const cats = config.categories[deptName] || [];
                cats.forEach(c => delete newConfig.items[c]);
                delete newConfig.categories[deptName];
                
                handleSaveConfig(newConfig);
                if (selectedDeptForSettings === deptName) {
                    setSelectedDeptForSettings(newConfig.depts[0] || '');
                    setSelectedCatForSettings('');
                }
            };

            const handleDeleteCat = (idx) => {
                const catName = config.categories[selectedDeptForSettings][idx];
                const newConfig = { ...config };
                newConfig.categories[selectedDeptForSettings] = config.categories[selectedDeptForSettings].filter((_, i) => i !== idx);
                delete newConfig.items[catName];
                
                handleSaveConfig(newConfig);
                if (selectedCatForSettings === catName) setSelectedCatForSettings('');
            };

            const handleDeleteItem = (idx) => {
                const newConfig = { ...config };
                newConfig.items[selectedCatForSettings] = config.items[selectedCatForSettings].filter((_, i) => i !== idx);
                handleSaveConfig(newConfig);
            };

            if (!ready) return null;
            if (!isAuthorized) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in text-center">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="shield-check" size="32"></i>
                            </div>
                            <h2 className="text-xl font-bold mb-2 text-slate-800 text-center">業務管理システム</h2>
                            <p className="text-slate-500 text-sm mb-8 text-center">パスコードを入力してください</p>
                            <form onSubmit={handlePasscodeAuth} className="space-y-4">
                                <input type="password" required className="w-full px-4 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-black text-center text-2xl tracking-widest" placeholder="••••" value={passcodeInput} onChange={e => setPasscodeInput(e.target.value)} />
                                {errorMessage && <div className="p-3 bg-rose-50 text-rose-600 text-xs rounded-xl font-bold">{errorMessage}</div>}
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">認証する</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold italic animate-pulse">データを読み込み中...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-32">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-2">
                            <span className="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="layers" size="18"></i></span>
                            業務分担管理 <span className="text-xs text-slate-300 font-normal">v2.4</span>
                        </h1>
                        <div className="flex gap-2 text-slate-600">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all shadow-sm"><i data-lucide="settings" size="20"></i></button>
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm font-bold">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 flex items-center gap-1"><i data-lucide="building" size="10"></i> 部署で抽出</label>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                <button onClick={() => { setDeptFilter('すべて'); setCatFilter('すべて'); }} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${deptFilter === 'すべて' ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>すべて</button>
                                {config.depts.map(r => (
                                    <button key={r} onClick={() => { setDeptFilter(r); setCatFilter('すべて'); }} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${deptFilter === r ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{r}</button>
                                ))}
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 flex items-center gap-1"><i data-lucide="tag" size="10"></i> カテゴリで抽出</label>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                <button onClick={() => setCatFilter('すべて')} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${catFilter === 'すべて' ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>すべて</button>
                                {categoryListForFilter.map(c => (
                                    <button key={c} onClick={() => setCatFilter(c)} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${catFilter === c ? 'bg-indigo-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{c}</button>
                                ))}
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 flex items-center gap-1"><i data-lucide="user" size="10"></i> 担当者で抽出</label>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                <button onClick={() => setOwnerFilter('全員')} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${ownerFilter === '全員' ? 'bg-emerald-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>全員</button>
                                {ownerList.map(o => (
                                    <button key={o} onClick={() => setOwnerFilter(o)} className={`px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${ownerFilter === o ? 'bg-emerald-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{o}</button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Task List Table */}
                    <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden mb-8">
                        <div className="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <div className="flex items-center gap-3">
                                <span className="text-sm font-bold text-slate-900">表示中の業務</span>
                                <span className="bg-white px-2 py-1 rounded-lg text-xs font-black text-blue-600 shadow-sm border border-slate-200">{filteredTasks.length} 件</span>
                            </div>
                            <div className="relative w-full max-w-xs hidden md:block">
                                <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" size="14"></i>
                                <input type="text" placeholder="キーワード検索..." className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm font-medium" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left min-w-[900px]">
                                <thead className="bg-slate-50/50 border-b border-slate-100">
                                    <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <th className="px-6 py-4">部署 / カテゴリ</th>
                                        <th className="px-6 py-4">業務名称</th>
                                        <th className="px-6 py-4">担当 / 確認 / 引継者</th>
                                        <th className="px-6 py-4 text-center">W</th>
                                        <th className="px-6 py-4 text-center">引継ぎ</th>
                                        <th className="px-6 py-4 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 font-medium">
                                    {filteredTasks.map(t => (
                                        <tr key={t.id} className="hover:bg-slate-50/30 group transition-colors text-slate-700">
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-tighter mb-1">{t.dept}</div>
                                                <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold ${t.category === 'DX' ? 'tag-dx' : t.category === '事務' ? 'tag-office' : 'tag-common'}`}>{t.category}</span>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="text-sm font-bold text-slate-800">{t.item}</div>
                                                {(t.minor || t.memo) && (
                                                    <div className="text-[10px] text-slate-400 font-normal truncate max-w-[200px] mt-0.5 italic">
                                                        {t.memo ? `(備考: ${t.memo})` : t.minor}
                                                    </div>
                                                )}
                                            </td>
                                            <td className="px-6 py-4 text-xs whitespace-nowrap">
                                                <div className="text-slate-900 font-bold">{t.owner || '-'}</div>
                                                <div className="text-slate-400 font-normal mt-0.5">検: {t.verifier || '-'} | 継: {t.successor || '-'}</div>
                                            </td>
                                            <td className="px-6 py-4 text-center font-black text-slate-400">{t.doubleCheck}</td>
                                            <td className="px-6 py-4 text-center text-xl font-bold">
                                                <span className={t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : t.handover === '－' ? 'text-slate-300' : 'text-blue-500'}>{t.handover}</span>
                                            </td>
                                            <td className="px-6 py-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }} className="p-2 text-slate-300 hover:text-blue-600 bg-slate-100/0 hover:bg-slate-100 rounded-lg"><i data-lucide="edit-3" size="16"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Floating Add Button */}
                    <button onClick={() => {
                        const d = config.depts[0] || '';
                        const c = config.categories[d]?.[0] || '';
                        const i = config.items[c]?.[0] || '';
                        setEditingTask(null); 
                        setFormData({ dept: d, category: c, item: i, minor: '', owner: '', verifier: '', doubleCheck: '－', handover: '×', successor: '', memo: '' }); 
                        setIsModalOpen(true);
                    }} className="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 text-white rounded-3xl shadow-2xl flex items-center justify-center z-40 hover:scale-110 active:scale-95 transition-all">
                        <i data-lucide="plus" size="28"></i>
                    </button>

                    {/* Entry Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4 text-slate-900">
                            <div className="bg-white w-full max-w-2xl rounded-t-3xl md:rounded-3xl flex flex-col max-h-[92vh] overflow-hidden animate-fade-in shadow-2xl">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="font-black flex items-center gap-2 text-slate-700">
                                        {editingTask ? '業務内容を編集' : '新しい業務を登録'}
                                    </h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors"><i data-lucide="x" size="20"></i></button>
                                </div>
                                <div className="p-6 space-y-6 overflow-y-auto flex-1 bg-slate-50/50">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">所属部署</label>
                                            <select className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all" value={formData.dept} onChange={e => {
                                                const d = e.target.value;
                                                const c = config.categories[d]?.[0] || '';
                                                setFormData({...formData, dept: d, category: c, item: config.items[c]?.[0] || ''});
                                            }}>
                                                {config.depts.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">カテゴリ (タグ)</label>
                                            <select className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-500" value={formData.category} onChange={e => {
                                                const c = e.target.value;
                                                setFormData({...formData, category: c, item: config.items[c]?.[0] || ''});
                                            }}>
                                                {(config.categories[formData.dept] || []).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">業務名称 (中区分)</label>
                                        <select className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm outline-none focus:ring-2 focus:ring-blue-500" value={formData.item} onChange={e => setFormData({...formData, item: e.target.value})}>
                                            {(config.items[formData.category] || []).map(i => <option key={i} value={i}>{i}</option>)}
                                            <option value="">-- 手入力 / その他 --</option>
                                        </select>
                                        {(!config.items[formData.category]?.includes(formData.item) && formData.item !== "") && (
                                            <input className="w-full px-4 py-3 mt-2 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm outline-none animate-fade-in transition-all" value={formData.item} onChange={e => setFormData({...formData, item: e.target.value})} placeholder="業務名を手入力..." />
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm font-bold">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">現在の担当者</label>
                                            <input className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none" placeholder="名前" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">確認責任者</label>
                                            <input className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none" placeholder="名前" value={formData.verifier} onChange={e => setFormData({...formData, verifier: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 text-blue-600">引継ぎ者(後任)</label>
                                            <input className="w-full px-4 py-3 bg-blue-50 border border-blue-200 rounded-2xl outline-none" placeholder="後任者名" value={formData.successor} onChange={e => setFormData({...formData, successor: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Wチェック</label>
                                            <div className="flex gap-2 bg-slate-200/50 p-1 rounded-2xl">
                                                {['〇', '×', '－'].map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, doubleCheck: v})} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all ${formData.doubleCheck === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">引継ぎ状況</label>
                                            <div className="flex gap-1.5 bg-slate-200/50 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                                {Object.keys(handoverLabels).map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, handover: v})} className={`min-w-[44px] flex-1 py-3 rounded-xl font-black text-lg transition-all ${formData.handover === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1 text-emerald-600">備考欄</label>
                                        <textarea className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl h-24 outline-none resize-none focus:ring-2 focus:ring-emerald-500 font-medium" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})} placeholder="補足、手順URLなど" />
                                    </div>

                                    {editingTask && (
                                        <div className="pt-4">
                                            <button onClick={() => setDeleteConfirm(editingTask.id)} className="w-full py-4 text-rose-500 font-bold bg-rose-50 rounded-2xl hover:bg-rose-100 transition-colors border border-rose-100 flex items-center justify-center gap-2"><i data-lucide="trash-2" size="18"></i> このデータを削除する</button>
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 border-t bg-white safe-area-bottom">
                                    <button onClick={handleSaveTask} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal (並び替え・削除機能) */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 text-slate-900">
                            <div className="bg-white w-full max-w-6xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl animate-fade-in" onTouchMove={moveTouchSort} onTouchEnd={handleSortEnd}>
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="font-black flex items-center gap-2"><i data-lucide="settings" size="20"></i> マスター構造管理</h2>
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" size="20"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 md:p-8">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {/* 1. 部署/課 */}
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">1. 部署/課</h3>
                                            <div className="space-y-2 min-h-[100px] bg-slate-50/50 p-2 rounded-2xl border border-slate-100 font-bold text-slate-700">
                                                {config.depts.map((d, i) => (
                                                    <div key={d} data-index={i} data-type="dept" draggable={editingIndex === null} onDragStart={() => {setDraggedIndex(i); setDragType('dept');}} onDragOver={(e) => {e.preventDefault(); if(dragType==='dept') setDragOverIndex(i);}} onDragEnd={handleSortEnd} onTouchStart={() => startTouchSort(i, 'dept')}
                                                        className={`flex items-center gap-2 p-1.5 rounded-xl transition-all sortable-item ${selectedDeptForSettings === d ? 'bg-blue-600 text-white shadow-lg ring-4 ring-blue-100' : 'bg-white text-slate-600 border border-slate-200'} ${draggedIndex === i && dragType === 'dept' ? 'dragging touch-dragging' : ''} ${dragOverIndex === i && dragType === 'dept' ? 'drag-over' : ''}`}>
                                                        {editingIndex === i && dragType === 'dept' ? (
                                                            <div className="flex-1 flex gap-1 animate-fade-in" onPointerDown={e => e.stopPropagation()}>
                                                                <input autoFocus className="flex-1 px-2 py-1 text-sm bg-white text-slate-900 rounded-lg outline-none" value={editingValue} onChange={e => setEditingValue(e.target.value)} />
                                                                <button onClick={saveEdit} className="p-1 text-green-400"><i data-lucide="check" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <button onClick={() => {setSelectedDeptForSettings(d); setSelectedCatForSettings('');}} className="flex-1 text-left px-2 text-sm truncate">{d}</button>
                                                                <button onClick={() => startEdit(i, d, 'dept')} className={`p-1 ${selectedDeptForSettings === d ? 'text-white/60' : 'text-slate-300'}`}><i data-lucide="edit-2" size="12"></i></button>
                                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteDept(i); }} className={`p-1 ${selectedDeptForSettings === d ? 'text-white/60' : 'text-slate-300'} hover:text-rose-500`}><i data-lucide="trash-2" size="14"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-1 pt-2">
                                                <input className="flex-1 px-4 py-2.5 bg-slate-100 border-none rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-500" placeholder="新規部署..." value={newDeptInput} onChange={e => setNewDeptInput(e.target.value)} />
                                                <button onClick={addDept} className="p-3 bg-slate-800 text-white rounded-xl shadow-md"><i data-lucide="plus" size="16"></i></button>
                                            </div>
                                        </div>
                                        {/* 2. カテゴリ(大区分) */}
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">2. カテゴリ(大区分)</h3>
                                            <div className="space-y-2 min-h-[100px] bg-slate-50/50 p-2 rounded-2xl border border-slate-100 font-bold text-slate-700">
                                                {!selectedDeptForSettings && <div className="text-center py-10 text-[10px] text-slate-300 italic font-medium">部署を選択してください</div>}
                                                {(config.categories[selectedDeptForSettings] || []).map((c, i) => (
                                                    <div key={c} data-index={i} data-type="cat" draggable={editingIndex === null} onDragStart={() => {setDraggedIndex(i); setDragType('cat');}} onDragOver={(e) => {e.preventDefault(); if(dragType==='cat') setDragOverIndex(i);}} onDragEnd={handleSortEnd} onTouchStart={() => startTouchSort(i, 'cat')}
                                                        className={`flex items-center gap-2 p-1.5 rounded-xl transition-all sortable-item ${selectedCatForSettings === c ? 'bg-indigo-500 text-white shadow-lg ring-4 ring-indigo-50' : 'bg-white text-slate-600 border border-slate-200'} ${draggedIndex === i && dragType === 'cat' ? 'dragging touch-dragging' : ''} ${dragOverIndex === i && dragType === 'cat' ? 'drag-over' : ''}`}>
                                                        {editingIndex === i && dragType === 'cat' ? (
                                                            <div className="flex-1 flex gap-1 animate-fade-in" onPointerDown={e => e.stopPropagation()}>
                                                                <input autoFocus className="flex-1 px-2 py-1 text-sm bg-white text-slate-900 rounded-lg outline-none" value={editingValue} onChange={e => setEditingValue(e.target.value)} />
                                                                <button onClick={saveEdit} className="p-1 text-green-400"><i data-lucide="check" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <button onClick={() => setSelectedCatForSettings(c)} className="flex-1 text-left px-2 text-sm truncate">{c}</button>
                                                                <button onClick={() => startEdit(i, c, 'cat')} className={`p-1 ${selectedCatForSettings === c ? 'text-white/60' : 'text-slate-300'}`}><i data-lucide="edit-2" size="12"></i></button>
                                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteCat(i); }} className={`p-1 ${selectedCatForSettings === c ? 'text-white/60' : 'text-slate-300'} hover:text-rose-500`}><i data-lucide="trash-2" size="14"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-1 pt-2">
                                                <input className="flex-1 px-4 py-2.5 bg-slate-100 border-none rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500" placeholder="新規カテゴリ..." value={newCatInput} onChange={e => setNewCatInput(e.target.value)} />
                                                <button onClick={addCat} className="p-3 bg-slate-800 text-white rounded-xl shadow-md"><i data-lucide="plus" size="16"></i></button>
                                            </div>
                                        </div>
                                        {/* 3. 業務項目(中区分) */}
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">3. 業務項目(中区分)</h3>
                                            <div className="space-y-2 min-h-[100px] bg-slate-50/50 p-2 rounded-2xl border border-slate-100 font-bold text-slate-700">
                                                {!selectedCatForSettings && <div className="text-center py-10 text-[10px] text-slate-300 italic font-medium">カテゴリを選択してください</div>}
                                                {(config.items[selectedCatForSettings] || []).map((v, i) => (
                                                    <div key={v} data-index={i} data-type="item" draggable={editingIndex === null} onDragStart={() => {setDraggedIndex(i); setDragType('item');}} onDragOver={(e) => {e.preventDefault(); if(dragType==='item') setDragOverIndex(i);}} onDragEnd={handleSortEnd} onTouchStart={() => startTouchSort(i, 'item')}
                                                        className={`flex items-center gap-2 p-2 rounded-xl transition-all sortable-item bg-white text-slate-600 border border-slate-200 ${draggedIndex === i && dragType === 'item' ? 'dragging touch-dragging' : ''} ${dragOverIndex === i && dragType === 'item' ? 'drag-over' : ''}`}>
                                                        {editingIndex === i && dragType === 'item' ? (
                                                            <div className="flex-1 flex gap-1 animate-fade-in" onPointerDown={e => e.stopPropagation()}>
                                                                <input autoFocus className="flex-1 px-2 py-1 text-sm bg-white text-slate-900 rounded-lg outline-none" value={editingValue} onChange={e => setEditingValue(e.target.value)} />
                                                                <button onClick={saveEdit} className="p-1 text-green-400"><i data-lucide="check" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <span className="flex-1 text-left px-2 text-sm truncate">{v}</span>
                                                                <button onClick={() => startEdit(i, v, 'item')} className="p-1 text-slate-300"><i data-lucide="edit-2" size="12"></i></button>
                                                                <button onClick={() => handleDeleteItem(i)} className="p-1 text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" size="14"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-1 pt-2">
                                                <input className="flex-1 px-4 py-2.5 bg-slate-100 border-none rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500" placeholder="新規業務項目..." value={newItemInput} onChange={e => setNewItemInput(e.target.value)} />
                                                <button onClick={addItem} className="p-3 bg-slate-800 text-white rounded-xl shadow-md"><i data-lucide="plus" size="16"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirm (Tasks) */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in text-center">
                                <h3 className="font-bold mb-6 text-slate-800 text-lg">データを完全に削除しますか？</h3>
                                <div className="flex gap-3">
                                    <button onClick={confirmDelete} className="flex-1 py-4 bg-rose-600 text-white font-black rounded-2xl active:scale-95 transition-all shadow-lg shadow-rose-200">削除する</button>
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-all">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 1000);
    </script>
</body>
</html>

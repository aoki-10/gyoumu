<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="業務管理">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">
    
    <title>業務分担管理ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .dragging { opacity: 0.5; border: 2px dashed #2563eb !important; background: #eff6ff !important; }
        .drag-over { border-top: 4px dashed #2563eb !important; }
        .touch-active { transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 50; }
        
        .selectable-domain {
            user-select: all !important;
            -webkit-user-select: all !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="loader">システムを起動中...</div>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfj4ryE3dpw0MrECkGA0loENrUEdCBiaA",
            authDomain: "gyoumukanri-301ba.firebaseapp.com",
            projectId: "gyoumukanri-301ba",
            storageBucket: "gyoumukanri-301ba.firebasestorage.app",
            messagingSenderId: "1031524559575",
            appId: "1:1031524559575:web:c3f16c110591aa60889e92"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "gyoumukanri-main-v1"; 

            window.firebaseApp = { 
                auth, db, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc, writeBatch,
                GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
            };
            
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Firebase init error:", error);
            document.getElementById('loader').innerHTML = `<div class="p-6 text-center text-rose-600 font-bold">Firebase設定エラー</div>`;
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [tasks, setTasks] = useState([]);
            const [config, setConfig] = useState({ roles: ['共通'], roleMajors: { '共通': [] } });
            const [loading, setLoading] = useState(true);
            const [errorMessage, setErrorMessage] = useState(null);
            const [copyStatus, setCopyStatus] = useState('コピー');
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [selectedRoleForSettings, setSelectedRoleForSettings] = useState('');
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [roleFilter, setRoleFilter] = useState('すべて');
            const [searchTerm, setSearchTerm] = useState('');

            const [draggedIndex, setDraggedIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const longPressTimer = useRef(null);

            const [newRoleInput, setNewRoleInput] = useState('');
            const [newMajorInput, setNewMajorInput] = useState('');
            const [editingRoleIndex, setEditingRoleIndex] = useState(null);
            const [editingRoleValue, setEditingRoleValue] = useState('');
            const [editingMajorIndex, setEditingMajorIndex] = useState(null);
            const [editingMajorValue, setEditingMajorValue] = useState('');

            const [formData, setFormData] = useState({
                major: '', medium: '', minor: '', owner: '', verifier: '', 
                doubleCheck: '－', handover: '×', role: '共通', 
                handoverFrom: '', handoverTo: '', memo: ''
            });

            const handoverLabels = { '◎': '完了', '〇': 'たまに確認OK', '△': '引き継ぎ中', '×': '未着手', '－': 'なし' };

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseApp) {
                        setReady(true);
                        const loader = document.getElementById('loader');
                        if (loader) loader.style.display = 'none';
                    }
                };
                checkFirebase();
                window.addEventListener('firebase-ready', checkFirebase);
                return () => window.removeEventListener('firebase-ready', checkFirebase);
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { auth, onAuthStateChanged, signOut } = window.firebaseApp;
                return onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        if (u.email && u.email.endsWith('@gmail.com')) {
                            setUser(u);
                            setErrorMessage(null);
                        } else {
                            await signOut(auth);
                            setErrorMessage("@gmail.comドメインのアカウントのみアクセス可能です。");
                        }
                    } else {
                        setUser(null);
                    }
                });
            }, [ready]);

            useEffect(() => {
                if (!ready || !user) return;
                const { db, appId, collection, doc, setDoc, onSnapshot } = window.firebaseApp;
                
                const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const roles = Array.isArray(data.roles) ? data.roles : ['共通'];
                        setConfig({
                            roles: roles,
                            roleMajors: data.roleMajors || { '共通': [] }
                        });
                        setSelectedRoleForSettings(current => (!current || !roles.includes(current)) ? (roles[0] || '') : current);
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'settings'), config);
                    }
                });

                const unsubTasks = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snapshot) => {
                    setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });

                return () => { unsubConfig(); unsubTasks(); };
            }, [ready, user]);

            const copyToClipboard = (text) => {
                try {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = text;
                    tempInput.style.position = "fixed";
                    tempInput.style.left = "-9999px";
                    tempInput.style.top = "0";
                    document.body.appendChild(tempInput);
                    tempInput.focus();
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    setCopyStatus('コピー成功！');
                } catch (err) {
                    console.error("Copy failed", err);
                }
                setTimeout(() => setCopyStatus('コピー'), 2000);
            };

            const handleLogin = async () => {
                const { auth, GoogleAuthProvider, signInWithPopup } = window.firebaseApp;
                try {
                    setErrorMessage(null);
                    await signInWithPopup(auth, new GoogleAuthProvider());
                } catch (e) {
                    if (e.code === 'auth/unauthorized-domain') {
                        const currentDomain = window.location.hostname || "";
                        setErrorMessage(
                            <div className="space-y-4 animate-fade-in text-left">
                                <div className="flex items-center gap-2 text-rose-600 font-bold">
                                    <i data-lucide="alert-triangle"></i>
                                    <span>ドメイン未承認エラー</span>
                                </div>
                                <p className="text-[11px] text-slate-600 leading-relaxed">
                                    Firebaseに以下のドメインを1つずつ追加してください。
                                </p>
                                
                                <div className="space-y-2">
                                    {/* GitHubドメイン */}
                                    <div className="p-3 bg-blue-50 border border-blue-200 rounded-xl">
                                        <p className="text-[10px] text-blue-500 font-bold mb-1">① GitHub Pages用</p>
                                        <div className="flex items-center justify-between gap-2">
                                            <code className="text-[12px] font-mono font-bold text-blue-900 selectable-domain">aoki-10.github.io</code>
                                            <button onClick={() => copyToClipboard("aoki-10.github.io")} className="px-2 py-1 bg-blue-600 text-white text-[10px] rounded-lg font-bold">{copyStatus}</button>
                                        </div>
                                    </div>

                                    {/* プレビュー用 (もし取得できれば) */}
                                    {currentDomain && currentDomain !== "localhost" && (
                                        <div className="p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">② このプレビュー画面用</p>
                                            <div className="flex items-center justify-between gap-2">
                                                <code className="text-[11px] font-mono text-slate-700 truncate max-w-[140px] selectable-domain">{currentDomain}</code>
                                                <button onClick={() => copyToClipboard(currentDomain)} className="px-2 py-1 bg-slate-500 text-white text-[10px] rounded-lg font-bold">コピー</button>
                                            </div>
                                        </div>
                                    )}

                                    {!currentDomain && (
                                        <div className="p-3 bg-amber-50 border border-amber-200 rounded-xl text-[10px] text-amber-700">
                                            ⚠️ <strong>プレビュー用ドメインの取得に失敗しました。</strong><br/>
                                            ブラウザのアドレスバーに表示されているURLの `https://` から `/` までの部分を直接コピーしてください。
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    } else {
                        setErrorMessage(`ログインに失敗しました: ${e.message}`);
                    }
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.firebaseApp;
                await signOut(auth);
            };

            const handleSaveTask = async () => {
                const { db, appId, collection, doc, addDoc, updateDoc } = window.firebaseApp;
                const data = { ...formData, updatedBy: user.email, updatedAt: Date.now() };
                if (editingTask) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', editingTask.id), data);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { ...data, createdAt: Date.now() });
                setIsModalOpen(false);
            };

            const confirmDelete = async () => {
                const { db, appId, doc, deleteDoc } = window.firebaseApp;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', deleteConfirm));
                setDeleteConfirm(null); setIsModalOpen(false); setEditingTask(null);
            };

            if (!ready) return null;

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in text-center">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="shield-check" size="32"></i>
                            </div>
                            <h2 className="text-xl font-bold mb-2">業務管理システム</h2>
                            <p className="text-slate-500 text-sm mb-8">Googleアカウントでログインしてください<br/><span className="text-[10px] text-slate-400">(@gmail.com 限定)</span></p>
                            {errorMessage && <div className="mb-6 p-5 bg-rose-50 rounded-2xl border border-rose-100">{errorMessage}</div>}
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 py-4 rounded-2xl font-black shadow-sm active:scale-95 transition-all hover:bg-slate-50">
                                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" className="w-5 h-5" />
                                Googleでログイン
                            </button>
                        </div>
                    </div>
                );
            }

            // --- メイン画面ロジック (以降は変更なし) ---
            const filteredTasks = useMemo(() => {
                let f = tasks;
                if (roleFilter !== 'すべて') f = f.filter(t => t.role === roleFilter);
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    f = f.filter(t => (t.major + (t.medium||'') + (t.owner||'')).toLowerCase().includes(s));
                }
                const roleMajorsOrder = config.roleMajors[roleFilter] || [];
                return f.sort((a,b) => {
                    if (a.role !== b.role) return a.role.localeCompare(b.role, 'ja');
                    const aIdx = roleMajorsOrder.indexOf(a.major);
                    const bIdx = roleMajorsOrder.indexOf(b.major);
                    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                    return a.major.localeCompare(b.major, 'ja');
                });
            }, [tasks, roleFilter, searchTerm, config]);

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-32">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center gap-2">
                                <span className="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="layout-grid" size="18"></i></span>
                                業務分担管理
                            </h1>
                            <div className="flex items-center gap-2 mt-1">
                                {user.photoURL && <img src={user.photoURL} className="w-5 h-5 rounded-full border border-slate-200" />}
                                <span className="text-[10px] text-slate-400 font-bold">{user.email}</span>
                                <button onClick={handleLogout} className="text-[10px] text-blue-600 hover:underline">ログアウト</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all shadow-sm"><i data-lucide="settings" size="20"></i></button>
                            <button onClick={() => {
                                const firstRole = config.roles[0] || '共通';
                                setEditingTask(null); 
                                setFormData({ major: config.roleMajors[firstRole]?.[0] || '', medium: '', minor: '', owner: '', verifier: '', doubleCheck: '－', handover: '×', role: firstRole, handoverFrom: '', handoverTo: '', memo: '' }); 
                                setIsModalOpen(true);
                            }} className="hidden md:flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">
                                <i data-lucide="plus" size="18"></i> 業務追加
                            </button>
                        </div>
                    </div>

                    <div className="space-y-3 mb-6">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 text-slate-900">
                            <button onClick={() => setRoleFilter('すべて')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === 'すべて' ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>すべて</button>
                            {config.roles.map(role => (
                                <button key={role} onClick={() => setRoleFilter(role)} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${roleFilter === role ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'}`}>{role}</button>
                            ))}
                        </div>
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="16"></i>
                            <input type="text" placeholder="キーワード検索..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    <div className="hidden md:block bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50/80 border-b border-slate-200">
                                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <th className="px-6 py-4">職種 / 大区分</th>
                                    <th className="px-6 py-4">中区分</th>
                                    <th className="px-6 py-4">担当者 / 確認者</th>
                                    <th className="px-6 py-4 text-center">W</th>
                                    <th className="px-6 py-4 text-center">引継ぎ</th>
                                    <th className="px-6 py-4 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredTasks.map(t => (
                                    <tr key={t.id} className="hover:bg-slate-50/50 group transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="text-[10px] font-black text-slate-400 mb-0.5 uppercase tracking-tighter">{t.role}</div>
                                            <div className="text-sm font-bold text-slate-900">{t.major}</div>
                                        </td>
                                        <td className="px-6 py-4 font-bold text-slate-800">{t.medium}</td>
                                        <td className="px-6 py-4 text-xs font-medium">
                                            <div>{t.owner || '-'}</div>
                                            <div className="text-slate-400">検: {t.verifier || '-'}</div>
                                        </td>
                                        <td className="px-6 py-4 text-center font-bold text-slate-400">{t.doubleCheck}</td>
                                        <td className="px-6 py-4 text-center text-xl font-bold">
                                            <span className={t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : t.handover === '－' ? 'text-slate-400' : 'text-blue-500'}>{t.handover}</span>
                                        </td>
                                        <td className="px-6 py-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }} className="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="pencil" size="16"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div className="md:hidden space-y-4">
                        {filteredTasks.map(t => (
                            <div key={t.id} className="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm active:bg-slate-50 transition-colors" onClick={() => { setEditingTask(t); setFormData({...t}); setIsModalOpen(true); }}>
                                <div className="flex justify-between items-start mb-3">
                                    <span className="px-2 py-0.5 bg-slate-100 text-[10px] font-black text-slate-500 rounded-md">{t.role}</span>
                                    <span className={`text-2xl leading-none font-bold ${t.handover === '◎' ? 'text-green-600' : t.handover === '×' ? 'text-rose-400' : t.handover === '－' ? 'text-slate-300' : 'text-blue-500'}`}>{t.handover}</span>
                                </div>
                                <h3 className="font-bold text-slate-900 mb-1 leading-snug">{t.medium}</h3>
                                <p className="text-xs text-slate-400 font-medium">{t.major}</p>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => { 
                        const firstRole = config.roles[0] || '共通';
                        setEditingTask(null); 
                        setFormData({ major: config.roleMajors[firstRole]?.[0] || '', medium: '', minor: '', owner: '', verifier: '', doubleCheck: '－', handover: '×', role: firstRole, handoverFrom: '', handoverTo: '', memo: '' }); 
                        setIsModalOpen(true); 
                    }} className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl flex items-center justify-center z-40 active:scale-90 transition-all">
                        <i data-lucide="plus"></i>
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4 text-slate-900">
                            <div className="bg-white w-full max-w-2xl rounded-t-3xl md:rounded-3xl flex flex-col max-h-[92vh] overflow-hidden animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="font-bold">{editingTask ? '業務内容の編集' : '新規業務の登録'}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" size="20"></i></button>
                                </div>
                                <div className="p-6 space-y-6 overflow-y-auto flex-1">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">職種</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={formData.role} onChange={e => setFormData({...formData, role: e.target.value, major: config.roleMajors[e.target.value]?.[0] || ''})}>
                                                {config.roles.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">大区分</label>
                                            <select className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={formData.major} onChange={e => setFormData({...formData, major: e.target.value})}>
                                                {(config.roleMajors[formData.role] || []).map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">中区分 (業務名称)</label>
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500" value={formData.medium} onChange={e => setFormData({...formData, medium: e.target.value})} placeholder="業務名を入力" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">小区分 (詳細)</label>
                                        <textarea className="w-full px-4 py-3 bg-slate-50 rounded-2xl h-20 outline-none resize-none focus:ring-2 focus:ring-blue-500" value={formData.minor} onChange={e => setFormData({...formData, minor: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-sm font-bold">
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl outline-none" placeholder="担当者氏名" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                        <input className="w-full px-4 py-3 bg-slate-50 rounded-2xl outline-none" placeholder="確認責任者" value={formData.verifier} onChange={e => setFormData({...formData, verifier: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 pt-4 border-t">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Wチェック</label>
                                            <div className="flex gap-2 bg-slate-100 p-1 rounded-2xl">
                                                {['〇', '×', '－'].map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, doubleCheck: v})} className={`flex-1 py-3 rounded-xl font-black transition-all ${formData.doubleCheck === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">引継ぎ状況</label>
                                            <div className="flex gap-1.5 bg-slate-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                                {Object.keys(handoverLabels).map(v => (
                                                    <button key={v} onClick={() => setFormData({...formData, handover: v})} className={`min-w-[50px] flex-1 py-3 rounded-xl font-black text-lg transition-all ${formData.handover === v ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{v}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <textarea className="w-full px-4 py-3 bg-slate-50 rounded-2xl h-24 outline-none resize-none focus:ring-2 focus:ring-blue-500" placeholder="備考・メモ" value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})} />
                                    {editingTask && (
                                        <div className="pt-4 space-y-4">
                                            <div className="text-[10px] text-slate-300 font-bold uppercase text-center">最終更新: {editingTask.updatedBy} ({new Date(editingTask.updatedAt).toLocaleString()})</div>
                                            <button onClick={() => setDeleteConfirm(editingTask.id)} className="w-full py-4 text-rose-500 font-bold bg-rose-50 rounded-2xl active:bg-rose-100 transition-colors">このデータを削除する</button>
                                        </div>
                                    )}
                                </div>
                                <div className="p-6 border-t bg-white safe-area-bottom">
                                    <button onClick={handleSaveTask} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 text-slate-900">
                            <div className="bg-white w-full max-w-4xl max-h-[85vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center bg-white">
                                    <h2 className="font-bold flex items-center gap-2"><i data-lucide="settings" size="18"></i> システム設定</h2>
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-10">
                                    <section className="flex flex-col md:flex-row gap-8">
                                        <div className="md:w-1/3 space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">職種</h3>
                                            <div className="space-y-2">
                                                {config.roles.map((r, i) => (
                                                    <div key={i} className={`flex items-center gap-2 p-1 rounded-xl ${selectedRoleForSettings === r ? 'bg-blue-50 ring-1 ring-blue-100' : 'bg-slate-50'}`}>
                                                        {editingRoleIndex === i ? (
                                                            <div className="flex-1 flex gap-1 animate-fade-in">
                                                                <input autoFocus className="flex-1 px-3 py-1.5 text-sm bg-white rounded-lg outline-none ring-2 ring-blue-500" value={editingRoleValue} onChange={e => setEditingRoleValue(e.target.value)} />
                                                                <button onClick={saveEditedRole} className="p-1.5 text-green-600 hover:bg-green-50 rounded-lg"><i data-lucide="check" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <button onClick={() => setSelectedRoleForSettings(r)} className={`flex-1 text-left px-4 py-2.5 rounded-lg text-sm font-bold ${selectedRoleForSettings === r ? 'text-blue-600' : 'text-slate-500'}`}>{r}</button>
                                                                <button onClick={() => startEditRole(i)} className="p-2 text-slate-300 hover:text-blue-500"><i data-lucide="pencil" size="14"></i></button>
                                                                <button onClick={() => removeRole(i)} className="p-2 text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" size="14"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-1">
                                                <input className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="新職種..." value={newRoleInput} onChange={e => setNewRoleInput(e.target.value)} />
                                                <button onClick={addRole} className="p-3 bg-blue-600 text-white rounded-xl active:scale-95 transition-all"><i data-lucide="plus" size="18"></i></button>
                                            </div>
                                        </div>

                                        <div className="flex-1 space-y-4">
                                            <h3 className="text-sm font-bold flex items-center justify-between">
                                                「{selectedRoleForSettings}」の大区分
                                                <span className="text-[10px] text-slate-400 font-normal bg-slate-100 px-2 py-0.5 rounded">長押しで並び替え</span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                {(config.roleMajors[selectedRoleForSettings] || []).map((m, i) => (
                                                    <div key={i} data-index={i}
                                                        draggable={editingMajorIndex === null}
                                                        onDragStart={(e) => handleDragStart(e, i)}
                                                        onDragOver={(e) => handleDragOver(e, i)}
                                                        onDragEnd={handleDragEnd}
                                                        onTouchStart={(e) => handleTouchStart(e, i)}
                                                        onTouchMove={(e) => handleTouchMove(e, i)}
                                                        onTouchEnd={handleTouchEnd}
                                                        className={`flex items-center gap-2 px-3 py-1 bg-slate-50 rounded-xl border-2 transition-all cursor-move select-none
                                                            ${draggedIndex === i ? 'dragging touch-active' : 'border-slate-100'} 
                                                            ${dragOverIndex === i ? 'drag-over' : ''}`}>
                                                        {editingMajorIndex === i ? (
                                                            <div className="flex-1 flex gap-1 py-1" onPointerDown={e => e.stopPropagation()}>
                                                                <input autoFocus className="flex-1 px-3 py-1.5 text-sm bg-white rounded-lg outline-none ring-2 ring-blue-500" value={editingMajorValue} onChange={e => setEditingMajorValue(e.target.value)} />
                                                                <button onClick={saveEditedMajor} className="p-1.5 text-green-600 rounded-lg"><i data-lucide="check" size="16"></i></button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <span className="flex-1 text-sm font-bold text-slate-700 py-2">{m}</span>
                                                                <button onClick={(e) => { e.stopPropagation(); setEditingMajorIndex(i); setEditingMajorValue(m); }} className="p-2 text-slate-300 hover:text-blue-500"><i data-lucide="pencil" size="14"></i></button>
                                                                <button onClick={(e) => { e.stopPropagation(); removeMajorFromRole(i); }} className="p-2 text-slate-300 hover:text-rose-500"><i data-lucide="x" size="16"></i></button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <input className="flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="新規区分..." value={newMajorInput} onChange={e => setNewMajorInput(e.target.value)} />
                                                <button onClick={addMajorToRole} className="px-6 bg-slate-800 text-white rounded-xl active:scale-95 transition-all"><i data-lucide="plus" size="18"></i></button>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-fade-in text-slate-900">
                                <h3 className="font-bold mb-6">データを削除しますか？</h3>
                                <div className="flex gap-3">
                                    <button onClick={confirmDelete} className="flex-1 py-4 bg-rose-600 text-white font-bold rounded-2xl active:scale-95 transition-all">削除</button>
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-all">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }, 1000);
    </script>
</body>
</html>
